<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Sala com piso laminado instalado">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef1f6"/>
      <stop offset="1" stop-color="#dfe5ef"/>
    </linearGradient>
    <linearGradient id="plankGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9976a"/>
      <stop offset="1" stop-color="#a9743f"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a5a34"/>
      <stop offset="1" stop-color="#6e4527"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#wallGrad)"/>

  <!-- floor -->
  <rect x="0" y="400" width="800" height="200" fill="url(#plankGrad)"/>
  <g stroke="#8f5f36" stroke-width="2" opacity="0.55">
    <line x1="0" y1="430" x2="800" y2="430"/>
    <line x1="0" y1="465" x2="800" y2="465"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="535" x2="800" y2="535"/>
    <line x1="0" y1="570" x2="800" y2="570"/>
  </g>
  <g stroke="#8f5f36" stroke-width="2" opacity="0.35">
    <line x1="120" y1="400" x2="120" y2="430"/>
    <line x1="360" y1="430" x2="360" y2="465"/>
    <line x1="220" y1="465" x2="220" y2="500"/>
    <line x1="500" y1="400" x2="500" y2="430"/>
    <line x1="620" y1="465" x2="620" y2="500"/>
    <line x1="680" y1="500" x2="680" y2="535"/>
    <line x1="80" y1="535" x2="80" y2="570"/>
    <line x1="420" y1="535" x2="420" y2="570"/>
  </g>

  <!-- TV panel -->
  <rect x="470" y="230" width="230" height="175" rx="6" fill="url(#panelGrad)"/>
  <rect x="500" y="255" width="170" height="95" rx="4" fill="#1b1f27"/>
  <rect x="560" y="358" width="50" height="12" rx="3" fill="#333"/>

  <!-- plant -->
  <rect x="640" y="345" width="34" height="34" fill="#2b2f36" rx="3"/>
  <circle cx="657" cy="300" r="34" fill="#3f7d4e"/>
  <circle cx="640" cy="285" r="22" fill="#4a8f5a"/>
  <circle cx="675" cy="290" r="24" fill="#356b41"/>

  <!-- sofa -->
  <rect x="90" y="330" width="260" height="80" rx="16" fill="#c7ccd6"/>
  <rect x="80" y="300" width="280" height="55" rx="18" fill="#dde1e8"/>
  <rect x="80" y="295" width="55" height="95" rx="16" fill="#c7ccd6"/>
  <rect x="305" y="295" width="55" height="95" rx="16" fill="#c7ccd6"/>
  <rect x="150" y="300" width="45" height="30" rx="6" fill="#1b3d6d" opacity="0.85"/>
  <rect x="220" y="300" width="45" height="30" rx="6" fill="#2f5fa8" opacity="0.85"/>

  <!-- coffee table -->
  <rect x="150" y="450" width="140" height="10" rx="3" fill="#6e4527"/>
  <rect x="160" y="460" width="8" height="30" fill="#6e4527"/>
  <rect x="272" y="460" width="8" height="30" fill="#6e4527"/>

  <!-- window light -->
  <rect x="40" y="60" width="130" height="180" rx="6" fill="#ffffff" opacity="0.6"/>
  <line x1="105" y1="60" x2="105" y2="240" stroke="#c7ccd6" stroke-width="4"/>
  <line x1="40" y1="150" x2="170" y2="150" stroke="#c7ccd6" stroke-width="4"/>
</svg>
